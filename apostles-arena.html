<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Apostles' Arena — A New Testament Knowledge Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
/* =========================================================
   THEME TOKENS — same family as Saul's Journey
   ========================================================= */
:root {
  --ink: #2b1d0e;
  --ink-soft: #4a3520;
  --parchment: #f0e3c6;
  --parchment-dark: #d9c396;
  --parchment-shadow: #b89a68;
  --gold: #c9a34f;
  --gold-bright: #e8c878;
  --seal-red: #8b2c1a;
  --seal-red-dark: #5a1a0f;
  --moss: #4a6b3a;
  --moss-bright: #6d9656;
  --leather: #8b4513;
  --ember: #d97a3b;
  --shadow: rgba(43, 29, 14, 0.35);

  /* Player accent colors (for 3 contenders) */
  --p1: #7a2d1c;   /* deep red */
  --p2: #2d5d3a;   /* deep green */
  --p3: #1f3c63;   /* deep blue */

  --font-display: 'Cinzel', 'Trajan Pro', serif;
  --font-accent: 'IM Fell English SC', 'Palatino', serif;
  --font-body: 'EB Garamond', 'Garamond', serif;

  --radius: 4px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: var(--font-body);
  color: var(--ink);
  font-size: 18px;
  line-height: 1.5;
}

body {
  background-color: var(--parchment);
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(139,69,19,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 30%, rgba(184,154,104,0.3) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 80%, rgba(139,44,26,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 90%, rgba(43,29,14,0.15) 0%, transparent 55%),
    radial-gradient(circle at 50% 50%, rgba(240,227,198,1) 0%, rgba(217,195,150,1) 100%);
  background-attachment: scroll;
  padding: 10px;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.35;
  background-image:
    repeating-linear-gradient(0deg, rgba(43,29,14,0.025) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(43,29,14,0.02) 0 1px, transparent 1px 4px);
  mix-blend-mode: multiply;
  z-index: 0;
}

#app {
  max-width: 720px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* =========================================================
   TYPOGRAPHY
   ========================================================= */
h1, h2, h3 {
  font-family: var(--font-display);
  color: var(--ink);
  font-weight: 700;
  letter-spacing: 0.06em;
  margin: 0;
}
h1 { font-size: 2.1rem; line-height: 1.05; }
h2 { font-size: 1.4rem; line-height: 1.15; }
h3 { font-size: 1.05rem; letter-spacing: 0.12em; text-transform: uppercase; }

.eyebrow {
  font-family: var(--font-accent);
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--seal-red);
  margin-bottom: 6px;
}

p { margin: 0 0 12px 0; }

/* =========================================================
   SHARED PANEL
   ========================================================= */
.panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.18), rgba(184,154,104,0.10)),
    var(--parchment);
  border: 1px solid var(--parchment-shadow);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: 0 4px 12px rgba(43,29,14,0.18), inset 0 1px 0 rgba(255,255,255,0.4);
  position: relative;
}

.panel.tight { padding: 12px 14px; }

.panel-header {
  text-align: center;
  margin-bottom: 10px;
}

.divider {
  height: 1px;
  margin: 12px auto;
  background: linear-gradient(90deg, transparent, var(--ink-soft) 20%, var(--ink-soft) 80%, transparent);
  opacity: 0.5;
  max-width: 70%;
}

/* =========================================================
   BUTTONS
   ========================================================= */
button {
  font-family: var(--font-display);
  letter-spacing: 0.1em;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 700;
  text-transform: uppercase;
}

.btn-primary {
  display: inline-block;
  padding: 14px 22px;
  min-height: 52px;
  background: linear-gradient(180deg, var(--seal-red), var(--seal-red-dark));
  color: var(--parchment);
  border: 1px solid var(--seal-red-dark);
  border-radius: var(--radius);
  box-shadow: 0 3px 8px rgba(43,29,14,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
  transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(43,29,14,0.4); }
.btn-primary:active:not(:disabled) { transform: translateY(1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  display: inline-block;
  padding: 12px 18px;
  min-height: 44px;
  background: linear-gradient(180deg, var(--parchment), var(--parchment-dark));
  color: var(--ink);
  border: 1px solid var(--ink-soft);
  border-radius: var(--radius);
  box-shadow: 0 2px 6px rgba(43,29,14,0.2), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: transform 0.15s var(--ease);
}
.btn-secondary:hover:not(:disabled) { transform: translateY(-1px); }
.btn-secondary:active:not(:disabled) { transform: translateY(1px); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-gold {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--ink);
  border-color: var(--leather);
}

.btn-ghost {
  background: transparent;
  color: var(--ink-soft);
  border: 1px dashed var(--ink-soft);
  padding: 8px 14px;
  font-size: 0.78rem;
  border-radius: var(--radius);
}

/* =========================================================
   TITLE SCREEN
   ========================================================= */
.title-screen { text-align: center; padding: 24px 16px; }

.title-mark {
  width: 88px;
  height: 88px;
  margin: 0 auto 14px;
  position: relative;
}

.title-mark svg { width: 100%; height: 100%; display: block; }

.title-screen h1 {
  font-size: 2.6rem;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.title-screen .tagline {
  font-family: var(--font-accent);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-size: 0.9rem;
  color: var(--seal-red);
  margin-bottom: 18px;
}

.title-screen .blurb {
  font-style: italic;
  max-width: 460px;
  margin: 0 auto 22px;
  color: var(--ink-soft);
}

.title-rules {
  text-align: left;
  max-width: 460px;
  margin: 0 auto 24px;
  font-size: 0.95rem;
}
.title-rules h3 { margin-bottom: 8px; text-align: center; color: var(--seal-red); }
.title-rules ol { padding-left: 22px; margin: 0; }
.title-rules li { margin-bottom: 6px; }

/* =========================================================
   SETUP SCREEN
   ========================================================= */
.player-count-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 18px;
}
.player-count-row button {
  padding: 10px 18px;
  min-width: 56px;
  font-size: 1.1rem;
  background: transparent;
  border: 1px solid var(--ink-soft);
  color: var(--ink-soft);
  border-radius: var(--radius);
}
.player-count-row button.active {
  background: linear-gradient(180deg, var(--seal-red), var(--seal-red-dark));
  color: var(--parchment);
  border-color: var(--seal-red-dark);
}

.name-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.name-input-row .badge {
  width: 38px; height: 38px;
  min-width: 38px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--parchment);
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: 0;
  box-shadow: 0 2px 4px rgba(43,29,14,0.3);
}
.name-input-row input {
  flex: 1;
  font-family: var(--font-body);
  font-size: 1.05rem;
  padding: 10px 12px;
  border: 1px solid var(--ink-soft);
  background: rgba(255,255,255,0.45);
  color: var(--ink);
  border-radius: var(--radius);
  min-height: 44px;
}
.name-input-row input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }

/* =========================================================
   CHARACTER SELECT
   ========================================================= */
.select-header {
  text-align: center;
  margin-bottom: 14px;
}
.select-header .who {
  font-family: var(--font-accent);
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--seal-red);
}
.select-header h2 { margin-top: 4px; }

.char-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}

.char-card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.22), rgba(184,154,104,0.06)),
    var(--parchment);
  border: 1px solid var(--parchment-shadow);
  border-radius: var(--radius);
  padding: 12px;
  text-align: left;
  cursor: pointer;
  transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease), border-color 0.2s var(--ease);
  box-shadow: 0 2px 6px rgba(43,29,14,0.15);
  position: relative;
  overflow: hidden;
}
.char-card:hover:not(.taken):not(.locked) { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(43,29,14,0.3); }
.char-card.selected {
  border: 2px solid var(--seal-red);
  background: linear-gradient(180deg, rgba(139,44,26,0.10), rgba(139,44,26,0.02)), var(--parchment);
}
.char-card.taken {
  opacity: 0.45;
  cursor: not-allowed;
}
.char-card.taken::after {
  content: 'CHOSEN';
  position: absolute;
  top: 8px; right: 8px;
  font-family: var(--font-accent);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--seal-red);
  background: rgba(240,227,198,0.85);
  padding: 2px 6px;
  border: 1px solid var(--seal-red);
  border-radius: 2px;
}

.char-portrait {
  width: 56px; height: 56px;
  float: left;
  margin-right: 10px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, var(--gold-bright), var(--gold));
  border: 2px solid var(--leather);
  border-radius: 50%;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.4rem;
  color: var(--ink);
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 2px 4px rgba(43,29,14,0.3);
}

.char-card h3 {
  font-size: 1.05rem;
  margin-bottom: 2px;
  letter-spacing: 0.08em;
}
.char-role {
  font-family: var(--font-accent);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--seal-red);
  margin-bottom: 6px;
}
.char-stats {
  clear: both;
  display: flex;
  gap: 10px;
  margin: 8px 0 6px;
  font-family: var(--font-accent);
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  text-transform: uppercase;
}
.char-stats .stat strong { color: var(--ink); font-family: var(--font-display); }
.char-special {
  font-size: 0.85rem;
  color: var(--ink);
  font-style: italic;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--parchment-shadow);
}
.char-special strong {
  font-style: normal;
  color: var(--seal-red);
  font-family: var(--font-display);
  letter-spacing: 0.08em;
}

/* =========================================================
   BATTLE — HP HEADER
   ========================================================= */
.battle-header {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.hp-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(184,154,104,0.08));
  border: 1px solid var(--parchment-shadow);
  border-radius: var(--radius);
  transition: all 0.3s var(--ease);
  position: relative;
}
.hp-row.is-active {
  border: 2px solid var(--seal-red);
  background: linear-gradient(180deg, rgba(139,44,26,0.12), rgba(139,44,26,0.02));
  box-shadow: 0 0 0 3px rgba(139,44,26,0.18), 0 2px 8px rgba(43,29,14,0.3);
}
.hp-row.is-targetable {
  cursor: pointer;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,163,79,0.25);
  animation: pulseTarget 1.4s ease-in-out infinite;
}
.hp-row.is-targetable:hover { transform: translateY(-1px); }
.hp-row.is-fallen {
  opacity: 0.45;
  filter: grayscale(0.6);
}

@keyframes pulseTarget {
  0%,100% { box-shadow: 0 0 0 3px rgba(201,163,79,0.25); }
  50%     { box-shadow: 0 0 0 6px rgba(201,163,79,0.08); }
}

.hp-portrait {
  width: 44px; height: 44px;
  min-width: 44px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, var(--gold-bright), var(--gold));
  border: 2px solid var(--leather);
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.1rem;
  color: var(--ink);
  box-shadow: inset 0 2px 3px rgba(255,255,255,0.4);
}
.hp-portrait.p1 { background: linear-gradient(135deg, #c5402b, #7a2d1c); color: #fff5e0; border-color: #4a1a0d; }
.hp-portrait.p2 { background: linear-gradient(135deg, #6d9656, #2d5d3a); color: #f0f5e8; border-color: #1a3d22; }
.hp-portrait.p3 { background: linear-gradient(135deg, #4a7da8, #1f3c63); color: #e8eff8; border-color: #102245; }

.hp-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.hp-namerow {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 6px;
}
.hp-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hp-name .apostle {
  font-family: var(--font-accent);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  color: var(--seal-red);
  margin-left: 6px;
  font-weight: 400;
}
.hp-numbers {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 0.85rem;
  color: var(--ink);
  white-space: nowrap;
}
.hp-bar-outer {
  height: 10px;
  background: rgba(43,29,14,0.18);
  border: 1px solid var(--ink-soft);
  border-radius: 2px;
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(43,29,14,0.25);
}
.hp-bar-inner {
  height: 100%;
  background: linear-gradient(180deg, #b94a35, var(--seal-red));
  transition: width 0.5s var(--ease);
  position: relative;
}
.hp-bar-inner.healthy {
  background: linear-gradient(180deg, #7fb368, var(--moss));
}
.hp-bar-inner.warning {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
}
.hp-bar-inner.critical {
  background: linear-gradient(180deg, #d65535, var(--seal-red-dark));
  animation: criticalPulse 1.2s ease-in-out infinite;
}
@keyframes criticalPulse {
  0%,100% { filter: brightness(1); }
  50%     { filter: brightness(1.25); }
}

.hp-status {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.status-chip {
  font-family: var(--font-accent);
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 2px;
  background: rgba(43,29,14,0.1);
  color: var(--ink-soft);
  border: 1px solid var(--parchment-shadow);
}
.status-chip.defending  { background: rgba(74,107,58,0.2); color: var(--moss); border-color: var(--moss); }
.status-chip.charging   { background: rgba(217,122,59,0.2); color: var(--ember); border-color: var(--ember); }
.status-chip.skipping   { background: rgba(139,44,26,0.2); color: var(--seal-red); border-color: var(--seal-red); }
.status-chip.special-ready { background: rgba(201,163,79,0.25); color: var(--leather); border-color: var(--gold); }

/* Floating damage / heal numbers */
.float-num {
  position: absolute;
  top: -8px; right: 12px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.3rem;
  letter-spacing: 0;
  pointer-events: none;
  animation: floatNum 1.5s ease-out forwards;
  text-shadow: 0 1px 2px rgba(43,29,14,0.6), 0 0 4px rgba(255,255,255,0.5);
}
.float-num.damage { color: var(--seal-red); }
.float-num.heal   { color: var(--moss); }
.float-num.miss   { color: var(--ink-soft); font-size: 0.95rem; font-family: var(--font-accent); font-style: italic; }

@keyframes floatNum {
  0%   { opacity: 0; transform: translateY(8px) scale(0.7); }
  20%  { opacity: 1; transform: translateY(-4px) scale(1.15); }
  100% { opacity: 0; transform: translateY(-44px) scale(1); }
}

.hp-row.shake { animation: shake 0.5s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-5px); }
  40%     { transform: translateX(5px); }
  60%     { transform: translateX(-3px); }
  80%     { transform: translateX(3px); }
}

.hp-row.heal-glow { animation: healGlow 0.8s ease-out; }
@keyframes healGlow {
  0%   { box-shadow: 0 0 0 0 rgba(74,107,58,0.6); }
  60%  { box-shadow: 0 0 0 12px rgba(74,107,58,0); }
  100% { box-shadow: 0 0 0 0 rgba(74,107,58,0); }
}

/* =========================================================
   BATTLE — TURN BANNER
   ========================================================= */
.turn-banner {
  text-align: center;
  padding: 10px 14px;
  margin-bottom: 12px;
  background: linear-gradient(180deg, rgba(139,44,26,0.18), rgba(139,44,26,0.05));
  border: 1px solid var(--seal-red);
  border-radius: var(--radius);
  font-family: var(--font-accent);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-size: 0.85rem;
  color: var(--seal-red-dark);
}
.turn-banner strong {
  font-family: var(--font-display);
  letter-spacing: 0.1em;
  color: var(--ink);
}

/* =========================================================
   BATTLE — ACTIONS MENU
   ========================================================= */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 10px;
  min-height: 80px;
  border-radius: var(--radius);
  background: linear-gradient(180deg, var(--parchment), var(--parchment-dark));
  color: var(--ink);
  border: 1px solid var(--ink-soft);
  box-shadow: 0 2px 6px rgba(43,29,14,0.2), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: transform 0.15s var(--ease);
  cursor: pointer;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.action-btn:hover:not(:disabled) { transform: translateY(-2px); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.action-btn .icon {
  font-size: 1.4rem;
  line-height: 1;
}
.action-btn .label { font-size: 0.85rem; }
.action-btn .sub {
  font-family: var(--font-accent);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  font-weight: 400;
  text-transform: uppercase;
}

.action-btn.strike  { border-left: 4px solid var(--seal-red); }
.action-btn.pray    { border-left: 4px solid var(--moss); }
.action-btn.defend  { border-left: 4px solid var(--leather); }
.action-btn.special { border-left: 4px solid var(--gold); background: linear-gradient(180deg, #f4e7c8, var(--gold-bright)); }
.action-btn.special:disabled { background: linear-gradient(180deg, var(--parchment), var(--parchment-dark)); }

/* Instructions text */
.instructions {
  text-align: center;
  font-family: var(--font-accent);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--ink-soft);
  margin: 8px 0 12px;
}

/* =========================================================
   BATTLE — QUESTION
   ========================================================= */
.question-panel {
  background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(184,154,104,0.08)), var(--parchment);
  border: 1px solid var(--parchment-shadow);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 4px 12px rgba(43,29,14,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
  position: relative;
}
.question-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-family: var(--font-accent);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.question-source { color: var(--seal-red); }
.question-text {
  font-size: 1.15rem;
  line-height: 1.4;
  color: var(--ink);
  margin: 12px 0;
}

.answer-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 12px;
}
.answer-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  min-height: 56px;
  background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
  color: var(--ink);
  border: 1px solid var(--ink-soft);
  border-radius: var(--radius);
  text-align: left;
  font-family: var(--font-body);
  font-size: 1rem;
  letter-spacing: 0.01em;
  text-transform: none;
  font-weight: 400;
  cursor: pointer;
  transition: transform 0.15s var(--ease), background 0.15s var(--ease);
  position: relative;
}
.answer-btn .letter {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1rem;
  color: var(--seal-red);
  letter-spacing: 0;
  min-width: 20px;
}
.answer-btn:hover:not(:disabled) { background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.2)); transform: translateX(2px); }
.answer-btn:disabled { cursor: not-allowed; }

.answer-btn.correct {
  background: linear-gradient(180deg, rgba(109,150,86,0.35), rgba(74,107,58,0.18));
  border-color: var(--moss);
}
.answer-btn.wrong {
  background: linear-gradient(180deg, rgba(139,44,26,0.3), rgba(90,26,15,0.12));
  border-color: var(--seal-red-dark);
}
.answer-btn.removed {
  opacity: 0.25;
  text-decoration: line-through;
  cursor: not-allowed;
}
.answer-btn.correct .letter { color: var(--moss); }
.answer-btn.wrong .letter { color: var(--seal-red-dark); }

.explain-box {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(43,29,14,0.06);
  border-left: 3px solid var(--gold);
  font-size: 0.95rem;
  font-style: italic;
  color: var(--ink-soft);
  border-radius: 0 var(--radius) var(--radius) 0;
}

/* Reveal button */
.reveal-cta {
  text-align: center;
  margin-top: 14px;
}

/* Steal panel */
.steal-panel {
  margin-top: 12px;
  padding: 12px;
  background: linear-gradient(180deg, rgba(217,122,59,0.18), rgba(217,122,59,0.05));
  border: 1px dashed var(--ember);
  border-radius: var(--radius);
}
.steal-title {
  text-align: center;
  font-family: var(--font-display);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ember);
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 8px;
}
.steal-sub {
  text-align: center;
  font-family: var(--font-accent);
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.steal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.steal-btn {
  padding: 10px 8px;
  min-height: 48px;
  background: linear-gradient(180deg, var(--parchment), var(--parchment-dark));
  color: var(--ink);
  border: 1px solid var(--ink-soft);
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
}
.steal-btn.skip { grid-column: 1 / -1; opacity: 0.85; background: transparent; border-style: dashed; }

/* =========================================================
   BATTLE LOG
   ========================================================= */
.battle-log {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(43,29,14,0.04);
  border: 1px dashed var(--parchment-shadow);
  border-radius: var(--radius);
  font-family: var(--font-accent);
  font-size: 0.85rem;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  max-height: 110px;
  overflow-y: auto;
}
.battle-log .log-entry {
  padding: 2px 0;
  border-bottom: 1px dotted rgba(43,29,14,0.12);
}
.battle-log .log-entry:last-child { border-bottom: none; color: var(--ink); }

/* =========================================================
   VICTORY SCREEN
   ========================================================= */
.victory-screen { text-align: center; padding: 16px; }
.victory-screen h1 {
  font-size: 2.4rem;
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}
.victory-screen .winner-name {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  color: var(--seal-red);
  margin: 12px 0 4px;
}
.victory-screen .winner-apostle {
  font-family: var(--font-accent);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-size: 0.95rem;
  color: var(--ink-soft);
  margin-bottom: 14px;
}
.victory-quote {
  font-style: italic;
  font-size: 1.1rem;
  color: var(--ink);
  margin: 20px auto 6px;
  max-width: 460px;
  position: relative;
  padding: 0 22px;
}
.victory-quote::before, .victory-quote::after {
  content: '"';
  font-family: var(--font-display);
  font-size: 2.5rem;
  color: var(--gold);
  position: absolute;
  line-height: 0.8;
}
.victory-quote::before { left: 0; top: 8px; }
.victory-quote::after { right: 0; bottom: -10px; }
.victory-ref {
  font-family: var(--font-accent);
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--seal-red);
  margin-bottom: 24px;
}
.standings { margin: 20px 0; }
.standings .standing-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px dashed var(--parchment-shadow);
  font-family: var(--font-display);
  letter-spacing: 0.08em;
  font-size: 0.95rem;
}
.standings .standing-row:last-child { border-bottom: none; }
.standings .position {
  color: var(--seal-red);
  font-weight: 900;
  min-width: 32px;
}
.standings .standing-name { flex: 1; text-align: left; margin-left: 8px; }
.standings .standing-hp {
  font-family: var(--font-accent);
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
}

.victory-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
}

/* =========================================================
   AUDIO TOGGLE (corner)
   ========================================================= */
.audio-toggle {
  position: fixed;
  top: 14px;
  right: 14px;
  width: 40px;
  height: 40px;
  padding: 0;
  font-size: 1rem;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--parchment), var(--parchment-dark));
  color: var(--ink);
  border: 1px solid var(--ink-soft);
  box-shadow: 0 2px 4px rgba(43,29,14,0.2);
  letter-spacing: 0;
  z-index: 10;
}
.audio-toggle.on {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  border-color: var(--leather);
}

/* =========================================================
   STAGGER ANIMATION (panel reveals)
   ========================================================= */
.stagger > * { opacity: 0; animation: fadeUp 0.5s var(--ease) forwards; }
.stagger > *:nth-child(1) { animation-delay: 0.0s; }
.stagger > *:nth-child(2) { animation-delay: 0.06s; }
.stagger > *:nth-child(3) { animation-delay: 0.12s; }
.stagger > *:nth-child(4) { animation-delay: 0.18s; }
.stagger > *:nth-child(5) { animation-delay: 0.24s; }
.stagger > *:nth-child(6) { animation-delay: 0.30s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =========================================================
   BATTLE STAGE — characters in a row, RPG-style
   ========================================================= */
.battle-stage {
  display: grid;
  gap: 6px;
  margin-bottom: 12px;
  padding: 14px 8px 10px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(184,154,104,0.08) 60%, rgba(139,69,19,0.18) 100%),
    var(--parchment);
  border: 1px solid var(--parchment-shadow);
  border-radius: var(--radius);
  box-shadow: 0 4px 12px rgba(43,29,14,0.18), inset 0 1px 0 rgba(255,255,255,0.4);
  position: relative;
  overflow: hidden;
}

/* Ground line beneath the figures */
.battle-stage::before {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(43,29,14,0.25) 15%, rgba(43,29,14,0.25) 85%, transparent);
}

.battle-stage.players-2 { grid-template-columns: 1fr 1fr; }
.battle-stage.players-3 { grid-template-columns: 1fr 1fr 1fr; }

.combatant {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 6px 4px 4px;
  border-radius: var(--radius);
  border: 2px solid transparent;
  transition: all 0.3s var(--ease);
  position: relative;
  min-width: 0;
}

.combatant.is-active {
  background: linear-gradient(180deg, rgba(139,44,26,0.12) 0%, rgba(139,44,26,0.02) 70%, transparent 100%);
  border-color: var(--seal-red);
  box-shadow: 0 0 0 3px rgba(139,44,26,0.15);
}

.combatant.is-targetable {
  cursor: pointer;
  border-color: var(--gold);
  background: linear-gradient(180deg, rgba(201,163,79,0.18) 0%, rgba(201,163,79,0.02) 70%, transparent 100%);
  box-shadow: 0 0 0 3px rgba(201,163,79,0.18);
  animation: pulseTargetCombatant 1.4s ease-in-out infinite;
}
.combatant.is-targetable:hover { transform: translateY(-2px); }

@keyframes pulseTargetCombatant {
  0%,100% { box-shadow: 0 0 0 3px rgba(201,163,79,0.18); }
  50%     { box-shadow: 0 0 0 7px rgba(201,163,79,0.04); }
}

.combatant.is-fallen {
  opacity: 0.55;
}

.combatant-art-wrap {
  width: 100%;
  height: 130px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  margin-bottom: 2px;
  position: relative;
}

.apostle-svg {
  width: 92px;
  height: 130px;
  display: block;
  transform-origin: 50% 90%;
  transition: filter 0.3s var(--ease);
  filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35));
}

/* Active turn — slow gentle bob */
.combatant.is-active .apostle-svg {
  animation: combatantBob 2.2s ease-in-out infinite;
}
@keyframes combatantBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

/* Attack lunge */
.combatant.attacking .apostle-svg {
  animation: combatantLunge 0.55s var(--ease);
}
@keyframes combatantLunge {
  0%   { transform: translateX(0) translateY(0) scale(1); }
  25%  { transform: translateX(-6px) translateY(2px) scale(1.02); }
  55%  { transform: translateX(12px) translateY(-4px) scale(1.10); filter: drop-shadow(0 6px 8px rgba(139,44,26,0.5)) brightness(1.1); }
  100% { transform: translateX(0) translateY(0) scale(1); }
}

/* Hit shake + red flash */
.combatant.is-hit .apostle-svg {
  animation: combatantHit 0.55s ease-in-out;
}
@keyframes combatantHit {
  0%, 100% { transform: translateX(0); filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)); }
  15%      { transform: translateX(-6px); filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)) brightness(1.4) sepia(1) saturate(5) hue-rotate(-20deg); }
  30%      { transform: translateX(6px); filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)) brightness(1.4) sepia(1) saturate(5) hue-rotate(-20deg); }
  45%      { transform: translateX(-4px); filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)) brightness(1.2) sepia(1) saturate(3) hue-rotate(-20deg); }
  60%      { transform: translateX(4px); }
}

/* Heal glow */
.combatant.is-healing .apostle-svg {
  animation: combatantHeal 0.9s ease-out;
}
@keyframes combatantHeal {
  0%   { transform: translateY(0) scale(1); filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)); }
  40%  { transform: translateY(-6px) scale(1.05); filter: drop-shadow(0 0 12px rgba(109,150,86,0.85)) brightness(1.15); }
  100% { transform: translateY(0) scale(1); filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)); }
}

/* Defend pose — small shield aura */
.combatant.is-defending::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: var(--radius);
  pointer-events: none;
  background: radial-gradient(ellipse at center 60%, rgba(139,69,19,0.0) 50%, rgba(139,69,19,0.18) 70%, rgba(139,69,19,0) 100%);
  animation: defendAura 1.6s ease-in-out infinite;
}
@keyframes defendAura {
  0%,100% { opacity: 0.45; }
  50%     { opacity: 0.85; }
}

/* Charging (Peter) — orange ember glow */
.combatant.is-charging .apostle-svg {
  animation: combatantCharge 1.6s ease-in-out infinite;
}
@keyframes combatantCharge {
  0%, 100% { filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)) drop-shadow(0 0 6px rgba(217,122,59,0.4)); }
  50%      { filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)) drop-shadow(0 0 18px rgba(217,122,59,0.8)) brightness(1.15); }
}

/* Fallen — toppled over */
.combatant.is-fallen .apostle-svg {
  transform: rotate(-72deg) translateY(28px) translateX(-10px);
  filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35)) grayscale(0.55) brightness(0.75);
  transition: transform 0.8s var(--ease), filter 0.8s var(--ease);
}

/* HP block beneath each combatant */
.combatant-hp {
  width: 100%;
  padding: 0 4px;
}
.combatant-hp .hp-row-inner {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  margin-bottom: 2px;
}
.combatant-hp-numbers {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 0.78rem;
  color: var(--ink);
  letter-spacing: 0;
  white-space: nowrap;
}
.combatant-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  margin-top: 4px;
  color: var(--ink);
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 2px;
}
.combatant-name .apostle-tag {
  display: block;
  font-family: var(--font-accent);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: var(--seal-red);
  font-weight: 400;
  text-transform: uppercase;
  margin-top: 1px;
}
.combatant-chips {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 3px;
  margin-top: 4px;
  min-height: 14px;
}

/* Floating damage/heal numbers attached to combatant */
.combatant .float-num {
  position: absolute;
  top: 36px;
  left: 50%;
  transform: translateX(-50%);
  right: auto;
}

/* =========================================================
   CHARACTER ART IN SELECT CARDS
   ========================================================= */
.char-card {
  display: flex;
  flex-direction: column;
  align-items: stretch;
}
.char-card-top {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 6px;
}
.char-card .apostle-svg {
  width: 64px;
  height: 90px;
  min-width: 64px;
  filter: drop-shadow(0 2px 3px rgba(43,29,14,0.35));
}
.char-card-titles { flex: 1; min-width: 0; }
.char-card .char-stats { margin: 4px 0 0; }

/* =========================================================
   VERDICT BLOCK (correct/wrong banner)
   ========================================================= */
.verdict {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius);
  margin: 12px 0;
  font-family: var(--font-display);
  letter-spacing: 0.08em;
  font-weight: 700;
}
.verdict.verdict-correct {
  background: linear-gradient(180deg, rgba(109,150,86,0.30), rgba(74,107,58,0.10));
  border: 1px solid var(--moss);
  color: var(--moss);
}
.verdict.verdict-wrong {
  background: linear-gradient(180deg, rgba(139,44,26,0.25), rgba(90,26,15,0.08));
  border: 1px solid var(--seal-red);
  color: var(--seal-red);
}
.verdict-icon {
  font-size: 1.6rem;
  line-height: 1;
}
.verdict-text {
  font-size: 1rem;
}

/* Answer-reveal callout — shows the correct answer text at the end */
.answer-reveal {
  margin-top: 12px;
  padding: 10px 14px;
  background: linear-gradient(180deg, rgba(201,163,79,0.20), rgba(201,163,79,0.05));
  border: 1px solid var(--gold);
  border-left: 4px solid var(--leather);
  border-radius: var(--radius);
}
.answer-reveal-label {
  font-family: var(--font-accent);
  letter-spacing: 0.2em;
  font-size: 0.72rem;
  text-transform: uppercase;
  color: var(--seal-red);
  margin-bottom: 4px;
}
.answer-reveal-text {
  font-family: var(--font-body);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

/* =========================================================
   STEAL PROMPT (verdict buttons for stealer's verbal answer)
   ========================================================= */
.steal-prompt {
  margin-top: 12px;
  padding: 14px 12px;
  background: linear-gradient(180deg, rgba(217,122,59,0.20), rgba(217,122,59,0.05));
  border: 1px dashed var(--ember);
  border-radius: var(--radius);
  text-align: center;
}
.steal-prompt-icon {
  font-size: 1.6rem;
  line-height: 1;
  margin-bottom: 4px;
}
.steal-prompt-name {
  font-family: var(--font-display);
  font-weight: 900;
  letter-spacing: 0.1em;
  color: var(--ember);
  font-size: 1rem;
  margin-bottom: 4px;
}
.steal-prompt-instructions {
  font-family: var(--font-accent);
  letter-spacing: 0.14em;
  font-size: 0.75rem;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.steal-verdict-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.verdict-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px;
  min-height: 64px;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.15s var(--ease);
  border: 1px solid;
}
.verdict-btn:hover { transform: translateY(-2px); }
.verdict-btn:active { transform: translateY(1px); }
.verdict-btn .icon { font-size: 1.4rem; line-height: 1; }
.verdict-btn .label { font-size: 0.85rem; }
.verdict-btn.correct {
  background: linear-gradient(180deg, rgba(109,150,86,0.35), rgba(74,107,58,0.15));
  color: var(--moss);
  border-color: var(--moss);
}
.verdict-btn.wrong {
  background: linear-gradient(180deg, rgba(139,44,26,0.30), rgba(90,26,15,0.10));
  color: var(--seal-red);
  border-color: var(--seal-red);
}

/* =========================================================
   RESPONSIVE
   ========================================================= */
@media (max-width: 480px) {
  body { padding: 8px; font-size: 17px; }
  .panel { padding: 14px; }
  h1 { font-size: 1.7rem; }
  .title-screen h1 { font-size: 2rem; }
  .question-text { font-size: 1.05rem; }
  .answer-btn { font-size: 0.95rem; padding: 11px 12px; min-height: 52px; }
  .char-grid { grid-template-columns: 1fr; }
  .char-portrait { width: 50px; height: 50px; font-size: 1.25rem; }
  .action-btn { min-height: 70px; padding: 12px 8px; }
  .action-btn .label { font-size: 0.78rem; }
  .hp-portrait { width: 38px; height: 38px; font-size: 0.95rem; }
  .hp-name { font-size: 0.9rem; }
  /* Battle stage on narrow screens — tighter character art */
  .battle-stage { padding: 10px 4px 8px; gap: 3px; }
  .battle-stage::before { bottom: 55px; }
  .apostle-svg { width: 72px; height: 104px; }
  .combatant-art-wrap { height: 104px; }
  .combatant-name { font-size: 0.75rem; letter-spacing: 0.04em; }
  .combatant-name .apostle-tag { font-size: 0.55rem; letter-spacing: 0.14em; }
  .combatant-hp-numbers { font-size: 0.7rem; }
  .char-card .apostle-svg { width: 56px; height: 78px; min-width: 56px; }
}

  .apostle-svg { width: 62px; height: 88px; }

/* Build a flat question pool, each tagged with its source journey + cycle title */
function buildQuestionPool() {
  const pool = [];
  JOURNEYS.forEach(journey => {
    journey.cycles.forEach(cycle => {
      cycle.questions.forEach(q => {
        pool.push({
          ...q,
          source: `${journey.title} · ${cycle.title}`
        });
      });
    });
  });
  return pool;
}
const QUESTION_POOL = buildQuestionPool();

  questionRevealed: false,  // host has tapped to reveal answer choices
  awaitingAnswer: false,
  answerResult: null,   // 'correct' | 'wrong' | null
  stealing: false,
  stealerIdx: null,     // who is attempting steal
  questionPool: [],
  usedQuestions: new Set(),
  log: [],
  audioOn: false,
  removedOption: -1     // for John's Patmos Vision
};

/* =========================================================
   UTILITIES
   ========================================================= */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function drawQuestion() {
  // refill pool if exhausted
  if (state.usedQuestions.size >= QUESTION_POOL.length) {
    state.usedQuestions.clear();
  }
  let attempts = 0;
  while (attempts < 50) {
    const idx = Math.floor(Math.random() * QUESTION_POOL.length);
    if (!state.usedQuestions.has(idx)) {
      state.usedQuestions.add(idx);
      return { ...QUESTION_POOL[idx], poolIdx: idx };
    }
    attempts++;
  }
  // fallback
  return QUESTION_POOL[0];
}

function alivePlayers() {
  return state.players.filter(p => p.alive);
}

function log(msg) {
  state.log.push(msg);
  if (state.log.length > 50) state.log.shift();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* =========================================================
   RENDER ROOT
   ========================================================= */
function render() {
  const app = document.getElementById("app");
  let html = "";
  if (state.phase === "title")   html = renderTitle();
  if (state.phase === "setup")   html = renderSetup();
  if (state.phase === "select")  html = renderSelect();
  if (state.phase === "battle")  html = renderBattle();
  if (state.phase === "victory") html = renderVictory();
  app.innerHTML = html;
  attachHandlers();
  updateAudioToggle();
}

function updateAudioToggle() {
  const t = document.getElementById("audio-toggle");
  if (!t) return;
  if (state.audioOn) { t.classList.add("on"); t.textContent = "♫"; }
  else { t.classList.remove("on"); t.textContent = "♪"; }
}

  const cards = APOSTLES.map(a => {
    const taken = takenIds.has(a.id) && state.players[state.selectIdx]?.apostleId !== a.id;
    const selected = state.players[state.selectIdx]?.apostleId === a.id;
    return `
      <div class="char-card ${taken ? 'taken' : ''} ${selected ? 'selected' : ''}" data-apostle="${a.id}">
        <div class="char-card-top">
          ${apostleArt(a.id)}
          <div class="char-card-titles">
            <h3>${a.name}</h3>
            <div class="char-role">${a.role}</div>
            <div class="char-stats">
              <span class="stat">HP <strong>${a.maxHP}</strong></span>
              <span class="stat">Strike <strong>${a.strikeDamage}</strong></span>
              <span class="stat">Heal <strong>${a.prayHeal}</strong></span>
            </div>
          </div>
        </div>
        <div class="char-special"><strong>${a.specialName}</strong> — ${a.specialDesc}</div>
      </div>

  }).join('');

  const allChosen = state.players.every(p => p.apostleId);

  return `
  <div class="panel stagger">
    <div class="select-header">
      <div class="who">Player ${state.selectIdx + 1} of ${state.playerCount} · ${escapeHtml(player.name || 'Contender ' + (state.selectIdx+1))}</div>

      <button class="btn-primary" id="select-confirm" ${player.apostleId ? '' : 'disabled'}>
        ${state.selectIdx === state.playerCount - 1 ? 'To the Arena →' : 'Lock In →'}
