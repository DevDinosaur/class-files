}

/* =========================================================
   BATTLE SCREEN
   ========================================================= */
function renderBattle() {
  // Combatant stage — characters arranged in a row, RPG-style
  const stageCombatants = state.players.map((p, i) => {
    const apostle = findApostle(p.apostleId);
    const hpPct = clamp((p.hp / p.maxHp) * 100, 0, 100);
    let barCls = 'healthy';
    if (hpPct < 30) barCls = 'critical';
    else if (hpPct < 60) barCls = 'warning';

    const isActive = i === state.currentTurn && !state.stealing && p.alive;
    const isStealActive = state.stealing && state.stealerIdx === i;
    const isTargetable = state.pendingAction === 'strike' && state.pendingTarget === null && state.currentQuestion === null && i !== state.currentTurn && p.alive;
    const isApolloTargetable = state.pendingAction === 'special-skip' && state.pendingTarget === null && state.currentQuestion === null && i !== state.currentTurn && p.alive;
    const targetable = isTargetable || isApolloTargetable;
    const isFallen = !p.alive;

    const stateClasses = [
      (isActive || isStealActive) ? 'is-active' : '',
      targetable ? 'is-targetable' : '',
      isFallen ? 'is-fallen' : '',
      p.defending ? 'is-defending' : '',
      p.charging ? 'is-charging' : ''
    ].filter(Boolean).join(' ');

    const chips = [];
    if (p.defending) chips.push(`<span class="status-chip defending">✚ Defending</span>`);
    if (p.charging) chips.push(`<span class="status-chip charging">⚡ Charging</span>`);
    if (p.skippingTurn) chips.push(`<span class="status-chip skipping">⊘ Skip Next</span>`);
    if (p.removeWrongActive) chips.push(`<span class="status-chip special-ready">◉ Vision</span>`);

    return `
      <div class="combatant ${stateClasses}" data-player="${i}" ${targetable ? 'data-target="1"' : ''}>
        <div class="combatant-art-wrap">${apostleArt(p.apostleId)}</div>
        <div class="combatant-hp">
          <div class="hp-row-inner">
            <span class="combatant-hp-numbers">${Math.max(0, p.hp)} / ${p.maxHp}</span>
          </div>
          <div class="hp-bar-outer"><div class="hp-bar-inner ${barCls}" style="width:${hpPct}%;"></div></div>
        </div>
        <div class="combatant-name">${escapeHtml(p.name)}<span class="apostle-tag">${apostle.name}</span></div>
        <div class="combatant-chips">${chips.join('')}</div>
      </div>
    `;
  }).join('');

  // Middle area
  let middleHtml = '';
  if (state.currentQuestion) {
    middleHtml = renderQuestion();
  } else if ((state.pendingAction === 'strike' || state.pendingAction === 'special-skip') && state.pendingTarget === null) {
    const promptText = state.pendingAction === 'special-skip'
      ? `Choose who to silence — tap an opponent`
      : `Choose your target — tap an opponent`;
    middleHtml = `
      <div class="turn-banner">${promptText}</div>
      <div style="text-align:center;">
        <button class="btn-ghost" id="cancel-action">Cancel</button>
      </div>
    `;
  } else {
    middleHtml = renderActionMenu();
  }

  // Battle log
  const logHtml = state.log.length ? `
    <div class="battle-log">
      ${state.log.slice(-6).map(e => `<div class="log-entry">${e}</div>`).join('')}
    </div>
  ` : '';

  const currentP = state.players[state.currentTurn];
  const currentApostle = findApostle(currentP.apostleId);

  const turnBannerHtml = (!state.currentQuestion && !state.pendingAction && !state.stealing) ? `
    <div class="turn-banner">
      <strong>${escapeHtml(currentP.name)}'s turn</strong> · ${currentApostle.name} the ${currentApostle.role}
    </div>
  ` : '';

  return `
  <div>
    <div class="battle-stage players-${state.players.length}">${stageCombatants}</div>
    ${turnBannerHtml}
    ${middleHtml}
    ${logHtml}
  </div>
  `;
}

function renderActionMenu() {
  const p = state.players[state.currentTurn];
  const apostle = findApostle(p.apostleId);

  // Determine special button state
  let specialEnabled = !p.specialUsed;
  let specialLabel = apostle.specialName;
  let specialSub = '';
  if (p.specialUsed) {
    specialSub = '(spent)';
    specialEnabled = false;
  } else if (apostle.specialType === 'passive-retry') {
    specialSub = 'Passive — auto-triggers';
    specialEnabled = false;
  } else if (apostle.specialType === 'charge' && p.charging) {
    specialSub = 'Charged! Next Strike doubles';
    specialEnabled = false;
  }

  return `
    <div class="action-grid">
      <button class="action-btn strike" data-act="strike">
        <span class="icon">⚔</span>
        <span class="label">Strike</span>
        <span class="sub">${apostle.strikeDamage} dmg ${p.charging ? '(×2!)' : ''}</span>
      </button>
      <button class="action-btn pray" data-act="pray">
        <span class="icon">✚</span>
        <span class="label">Pray</span>
        <span class="sub">Heal ${apostle.prayHeal}</span>
      </button>
      <button class="action-btn defend" data-act="defend">
        <span class="icon">🛡</span>
        <span class="label">Defend</span>
        <span class="sub">Halve next hit</span>
      </button>
      <button class="action-btn special" data-act="special" ${specialEnabled ? '' : 'disabled'}>
        <span class="icon">✦</span>
        <span class="label">${specialLabel}</span>
        <span class="sub">${specialSub || apostle.specialDesc.split('.')[0]}</span>
      </button>
    </div>
  `;
}

function renderQuestion() {
  const q = state.currentQuestion;
  const isStealing = state.stealing;
  const activeIdx = isStealing ? state.stealerIdx : state.currentTurn;
  const activePlayer = state.players[activeIdx];
  const originalPlayer = state.players[state.currentTurn];

  // Determine the question sub-state. This is the heart of the steal info-leak fix:
  // once the original player commits, options DISAPPEAR. The stealer must answer
  // verbally; the host taps a Correct/Wrong verdict button. The correct option is
  // revealed only at the end, after the steal opportunity has been resolved.
  let sub;
  if (!state.questionRevealed) sub = 'awaiting-reveal';
  else if (isStealing && !state.answerResult) sub = 'stealing-await-verdict';
  else if (isStealing) sub = 'resolved';
  else if (!state.answerResult) sub = 'awaiting-answer';
  else if (state.answerResult === 'wrong' && !state.stealResolved) sub = 'answered-wrong';
  else sub = 'resolved';

  // Header label
  let actionLabel = '';
  if (isStealing) {
    actionLabel = 'STEAL ATTEMPT';
  } else {
    const labels = {
      strike: 'Strike',
      pray: 'Pray',
      defend: 'Defend',
      'special-aoe': findApostle(originalPlayer.apostleId).specialName,
      'special-skip': findApostle(originalPlayer.apostleId).specialName
    };
    actionLabel = labels[state.pendingAction] || '';
  }

  // Build the body based on sub-state
  let bodyHtml = '';

  if (sub === 'awaiting-reveal') {
    // Question text only — teacher reads aloud, then taps Reveal
    bodyHtml = `
      ${originalPlayer.removeWrongActive ? `<div class="instructions" style="color:var(--leather);">★ Patmos Vision active — one wrong option will be removed when choices are revealed</div>` : ''}
      <div class="reveal-cta">
        <div class="instructions">Read the question aloud. Tap when ready.</div>
        <button class="btn-primary" id="reveal-btn">Reveal Answer Choices</button>
      </div>
    `;
  }

  else if (sub === 'awaiting-answer') {
    // Options visible (original player picks). Damascus retry also lands here
    // with the previously-tapped option locked out via state.removedOption.
    const damascusHint = (state.removedOption >= 0 && !originalPlayer.removeWrongActive) ? `
      <div class="instructions" style="color:var(--seal-red);">★ Damascus Light — pick again from the remaining options</div>
    ` : '';
    bodyHtml = `
      ${damascusHint}
      <div class="answer-grid">
        ${q.options.map((opt, i) => {
          const removed = state.removedOption === i;
          return `<button class="answer-btn ${removed ? 'removed' : ''}" data-answer="${i}" ${removed ? 'disabled' : ''}>
            <span class="letter">${String.fromCharCode(65 + i)}</span>
            <span>${escapeHtml(opt)}</span>
          </button>`;
        }).join('')}
      </div>
    `;
  }

  else if (sub === 'answered-wrong') {
    // Original player committed and missed. HIDE options, show steal panel.
    // The stealer must not see the choices — they answer verbally.
    const stealers = state.players.map((p, i) => {
      if (i === state.currentTurn) return null;
      if (!p.alive) return null;
      return `<button class="steal-btn" data-steal="${i}">${escapeHtml(p.name)} stole it</button>`;
    }).filter(Boolean).join('');
    bodyHtml = `
      <div class="verdict verdict-wrong">
        <span class="verdict-icon">✗</span>
        <span class="verdict-text">${escapeHtml(originalPlayer.name)} missed.</span>
      </div>
      <div class="steal-panel">
        <div class="steal-title">⚡ Open for Steal! ⚡</div>
        <div class="steal-sub">Anyone else know it? Tap their name to let them try.</div>
        <div class="steal-grid">
          ${stealers}
          <button class="steal-btn skip" data-steal="skip">No one knew it — move on</button>
        </div>
      </div>
    `;
  }

  else if (sub === 'stealing-await-verdict') {
    // Stealer is answering verbally. NO options shown — they didn't get to see
    // them when the original player was answering. Host taps Correct or Wrong.
    bodyHtml = `
      <div class="steal-prompt">
        <div class="steal-prompt-icon">⚡</div>
        <div class="steal-prompt-name">${escapeHtml(activePlayer.name)} is stealing</div>
        <div class="steal-prompt-instructions">Let them answer aloud — no peeking at the choices. Tap below.</div>
        <div class="steal-verdict-grid">
          <button class="verdict-btn correct" data-verdict="correct">
            <span class="icon">✓</span>
            <span class="label">Correct</span>
          </button>
          <button class="verdict-btn wrong" data-verdict="wrong">
            <span class="icon">✗</span>
            <span class="label">Wrong</span>
          </button>
        </div>
      </div>
    `;
  }

  else if (sub === 'resolved') {
    // Show the correct answer text and explanation, then Continue.
    const correct = state.answerResult === 'correct';
    let resultLine = '';
    if (isStealing) {
      resultLine = correct
        ? `${escapeHtml(activePlayer.name)} stole it!`
        : `${escapeHtml(activePlayer.name)}'s steal failed.`;
    } else if (correct) {
      resultLine = `${escapeHtml(originalPlayer.name)} got it right.`;
    } else {
      resultLine = `${escapeHtml(originalPlayer.name)} missed and no one stole.`;
    }

    bodyHtml = `
      <div class="verdict verdict-${correct ? 'correct' : 'wrong'}">
        <span class="verdict-icon">${correct ? '✓' : '✗'}</span>
        <span class="verdict-text">${resultLine}</span>
      </div>
      <div class="answer-reveal">
        <div class="answer-reveal-label">The answer was</div>
        <div class="answer-reveal-text">${escapeHtml(q.options[q.correct])}</div>
      </div>
      <div class="explain-box">${escapeHtml(q.explain)}</div>
      <div style="text-align:center; margin-top: 12px;">
        <button class="btn-primary" id="continue-btn">Continue →</button>
      </div>
    `;
  }

  return `
    <div class="question-panel">
      <div class="question-header">
        <span>${escapeHtml(activePlayer.name)} · ${actionLabel}</span>
        <span class="question-source">${escapeHtml(q.source)}</span>
      </div>
      <div class="question-text">${escapeHtml(q.q)}</div>
      ${bodyHtml}
    </div>
  `;
}

/* =========================================================
   VICTORY SCREEN
   ========================================================= */
function renderVictory() {
  const winner = state.players.find(p => p.alive);
  const winnerApostle = winner ? findApostle(winner.apostleId) : null;

  // Quote selection — pick a fitting NT quote for the winning apostle
  const quotes = {
    paul: { text: "I have fought the good fight, I have finished the race, I have kept the faith.", ref: "2 Timothy 4:7" },
    peter: { text: "You are the Christ, the Son of the living God.", ref: "Matthew 16:16" },
    barnabas: { text: "He was a good man, full of the Holy Spirit and of faith.", ref: "Acts 11:24" },
    john: { text: "Beloved, let us love one another, for love is from God.", ref: "1 John 4:7" },
    silas: { text: "About midnight Paul and Silas were praying and singing hymns to God.", ref: "Acts 16:25" },
    apollos: { text: "He was an eloquent man, competent in the Scriptures.", ref: "Acts 18:24" }
  };
  const quote = winnerApostle ? quotes[winnerApostle.id] : null;

  // Standings — sorted by HP remaining (winner first), fallen by order
  const standings = [...state.players]
    .map((p, i) => ({ ...p, origIdx: i, apostle: findApostle(p.apostleId) }))
    .sort((a, b) => {
      if (a.alive && !b.alive) return -1;
      if (!a.alive && b.alive) return 1;
      return b.hp - a.hp;
    });

  return `
  <div class="panel victory-screen stagger">
    <div class="tagline">Victory</div>
    <h1>${winner ? escapeHtml(winner.name) + ' Stands' : 'No one stands'}</h1>
    ${winner ? `
      <div class="winner-name">${escapeHtml(winner.name)}</div>
      <div class="winner-apostle">${winnerApostle.name} · ${winnerApostle.role}</div>
    ` : ''}

    ${quote ? `
      <div class="victory-quote">${escapeHtml(quote.text)}</div>
      <div class="victory-ref">${escapeHtml(quote.ref)}</div>
    ` : ''}

    <div class="divider"></div>

    <div class="standings">
      ${standings.map((p, idx) => `
        <div class="standing-row">
          <span class="position">${idx === 0 ? '✦' : (idx + 1)}</span>
          <span class="standing-name">${escapeHtml(p.name)} <em style="color:var(--ink-soft);font-size:0.85em;">(${p.apostle.name})</em></span>
          <span class="standing-hp">${p.alive ? Math.max(0, p.hp) + ' HP' : 'Fallen'}</span>
        </div>
      `).join('')}
    </div>

    <div class="victory-actions">
      <button class="btn-secondary" id="play-again">Play Again (same lineup)</button>
      <button class="btn-primary" id="main-menu">New Game</button>
    </div>
  </div>
  `;
}

/* =========================================================
   HANDLERS
   ========================================================= */
function attachHandlers() {
  // Audio toggle (always present)
  const audioBtn = document.getElementById("audio-toggle");
  if (audioBtn) audioBtn.onclick = toggleAudio;

  // TITLE
  const beginBtn = document.getElementById("begin-btn");
  if (beginBtn) beginBtn.onclick = () => {
    state.phase = "setup";
    if (!state.players.length) {
      for (let i = 0; i < state.playerCount; i++) state.players.push({ name: "" });
    }
    render();
  };

  // SETUP
  document.querySelectorAll('[data-count]').forEach(b => {
    b.onclick = () => {
      const newCount = parseInt(b.dataset.count, 10);
      // Persist any current name inputs
      state.players.forEach((p, i) => {
        const input = document.getElementById(`name-${i}`);
        if (input) p.name = input.value;
      });
      state.playerCount = newCount;
      // Adjust players array length
      while (state.players.length < newCount) state.players.push({ name: "" });
      state.players = state.players.slice(0, newCount);
      render();
    };
  });
  const backBtn = document.getElementById("back-btn");
  if (backBtn) backBtn.onclick = () => { state.phase = "title"; render(); };
  const continueBtn = document.getElementById("setup-continue");
  if (continueBtn) continueBtn.onclick = () => {
    // gather names
    state.players.forEach((p, i) => {
      const input = document.getElementById(`name-${i}`);
      if (input) p.name = (input.value || `Contender ${i+1}`).trim() || `Contender ${i+1}`;
    });
    state.selectIdx = 0;
    state.phase = "select";
    render();
  };

  // CHARACTER SELECT
  document.querySelectorAll('.char-card').forEach(card => {
    if (card.classList.contains('taken')) return;
    card.onclick = () => {
      const apostleId = card.dataset.apostle;
      state.players[state.selectIdx].apostleId = apostleId;
      render();
    };
  });
  const selectConfirm = document.getElementById("select-confirm");
  if (selectConfirm) selectConfirm.onclick = () => {
    if (!state.players[state.selectIdx].apostleId) return;
    if (state.selectIdx < state.playerCount - 1) {
      state.selectIdx++;
      render();
    } else {
      startBattle();
    }
  };
  const selectBack = document.getElementById("select-back");
  if (selectBack) selectBack.onclick = () => {
    if (state.selectIdx > 0) {
      state.selectIdx--;
      render();
    }
  };

  // BATTLE — action buttons
  document.querySelectorAll('[data-act]').forEach(b => {
    b.onclick = () => handleAction(b.dataset.act);
  });
  // Cancel pending action
  const cancelBtn = document.getElementById("cancel-action");
  if (cancelBtn) cancelBtn.onclick = () => {
    state.pendingAction = null;
    state.pendingTarget = null;
    render();
  };
  // Target selection (clicking targetable hp rows)
  document.querySelectorAll('[data-target="1"]').forEach(r => {
    r.onclick = () => handleTargetSelect(parseInt(r.dataset.player, 10));
  });
  // Reveal answer choices
  const revealBtn = document.getElementById("reveal-btn");
  if (revealBtn) revealBtn.onclick = () => {
    state.questionRevealed = true;
    // If the current answerer has Patmos Vision active, remove a wrong option
    const activeIdx = state.stealing ? state.stealerIdx : state.currentTurn;
    const activeP = state.players[activeIdx];
    if (activeP.removeWrongActive && state.removedOption < 0) {
      // pick a wrong option index that is not the correct one
      const q = state.currentQuestion;
      const wrongIndices = q.options.map((_, i) => i).filter(i => i !== q.correct);
      state.removedOption = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
      activeP.removeWrongActive = false;  // consume
    }
    render();
  };
  // Answer choice buttons
  document.querySelectorAll('[data-answer]').forEach(b => {
    b.onclick = () => handleAnswer(parseInt(b.dataset.answer, 10));
  });
  // Continue after answer
  const continueQ = document.getElementById("continue-btn");
  if (continueQ) continueQ.onclick = resolveTurn;
  // Steal buttons (pick a stealer name OR "no one knew it")
  document.querySelectorAll('[data-steal]').forEach(b => {
    b.onclick = () => {
      const v = b.dataset.steal;
      if (v === "skip") {
        // Don't go straight to resolveTurn — re-render so the resolved state can
        // show "The answer was: X" for everyone to learn from, then Continue.
        state.stealResolved = true;
        render();
      } else {
        beginSteal(parseInt(v, 10));
      }
    };
  });
  // Steal verdict buttons (teacher taps after stealer answers verbally)
  document.querySelectorAll('[data-verdict]').forEach(b => {
    b.onclick = () => handleStealVerdict(b.dataset.verdict);
  });

  // VICTORY
  const playAgain = document.getElementById("play-again");
  if (playAgain) playAgain.onclick = () => {
    // Reset HP/status but keep players & apostle selections
    state.players.forEach(p => {
      const a = findApostle(p.apostleId);
      p.hp = a.maxHP;
      p.maxHp = a.maxHP;
      p.alive = true;
      p.defending = false;
      p.charging = false;
      p.skippingTurn = false;
      p.specialUsed = false;
      p.removeWrongActive = false;
    });
    state.currentTurn = 0;
    state.pendingAction = null;
    state.pendingTarget = null;
    state.currentQuestion = null;
    state.questionRevealed = false;
    state.answerResult = null;
    state.stealing = false;
    state.stealerIdx = null;
    state.stealResolved = false;
    state.usedQuestions.clear();
    state.log = [];
    state.removedOption = -1;
    state.phase = "battle";
    log("A new contest begins.");
    render();
  };
  const mainMenu = document.getElementById("main-menu");
  if (mainMenu) mainMenu.onclick = () => {
    // Full reset
    state.phase = "title";
    state.players = [];
    state.selectIdx = 0;
    state.currentTurn = 0;
    state.pendingAction = null;
    state.pendingTarget = null;
    state.currentQuestion = null;
    state.questionRevealed = false;
    state.answerResult = null;
    state.stealing = false;
    state.stealerIdx = null;
    state.stealResolved = false;
    state.usedQuestions.clear();
    state.log = [];
    state.removedOption = -1;
    render();
  };
}

/* =========================================================
   BATTLE LOGIC
   ========================================================= */
function startBattle() {
  state.players.forEach(p => {
    const a = findApostle(p.apostleId);
    p.hp = a.maxHP;
    p.maxHp = a.maxHP;
    p.alive = true;
    p.defending = false;
    p.charging = false;
    p.skippingTurn = false;
    p.specialUsed = false;
    p.removeWrongActive = false;
  });
  state.currentTurn = 0;
  state.pendingAction = null;
  state.pendingTarget = null;
  state.currentQuestion = null;
  state.questionRevealed = false;
  state.answerResult = null;
  state.stealing = false;
  state.stealerIdx = null;
  state.stealResolved = false;
  state.usedQuestions.clear();
  state.log = [];
  state.removedOption = -1;
  log("The arena opens. Three apostles enter.");
  state.phase = "battle";
  render();
  playTransitionSfx();
}

function handleAction(act) {
  const p = state.players[state.currentTurn];
  const apostle = findApostle(p.apostleId);

  if (act === "strike") {
    state.pendingAction = "strike";
    state.pendingTarget = null;
    render();
    return;
  }

  if (act === "pray") {
    state.pendingAction = "pray";
    drawAndShowQuestion();
    return;
  }

  if (act === "defend") {
    state.pendingAction = "defend";
    drawAndShowQuestion();
    return;
  }

  if (act === "special") {
    handleSpecial(apostle, p);
    return;
  }
}

function handleSpecial(apostle, p) {
  if (p.specialUsed) return;

  // Barnabas: instant self-heal, no question
  if (apostle.specialType === "self-heal-big") {
    p.specialUsed = true;
    const before = p.hp;
    p.hp = clamp(p.hp + 40, 0, p.maxHp);
    const healed = p.hp - before;
    showFloatNum(state.currentTurn, healed, "heal");
    flashHpRow(state.currentTurn, "heal-glow");
    log(`${p.name} used Son of Encouragement and healed ${healed} HP.`);
    playHealSfx();
    nextTurn();
    return;
  }

  // Peter: charge mode (skip turn, next strike doubles)
  if (apostle.specialType === "charge") {
    p.specialUsed = true;
    p.charging = true;
    log(`${p.name} is charging Pentecost Sermon — next strike will hit for double.`);
    playChargeSfx();
    nextTurn();
    return;
  }

  // John: arm Patmos Vision — next question reveals with one wrong option removed
  if (apostle.specialType === "remove-wrong") {
    p.specialUsed = true;
    p.removeWrongActive = true;
    log(`${p.name} called on Patmos Vision. A wrong option will be removed next question.`);
    playSpecialSfx();
    // Now they still need to pick an action
    render();
    return;
  }

  // Silas: AoE — pick action, then question
  if (apostle.specialType === "aoe") {
    state.pendingAction = "special-aoe";
    drawAndShowQuestion();
    return;
  }

  // Apollos: target skip — pick target first
  if (apostle.specialType === "skip-target") {
    state.pendingAction = "special-skip";
    state.pendingTarget = null;
    log(`${p.name} prepares Cornered Argument. Pick a target.`);
    render();
    return;
  }
}

function handleTargetSelect(targetIdx) {
  const p = state.players[targetIdx];
  if (!p.alive) return;
  if (targetIdx === state.currentTurn) return;
  state.pendingTarget = targetIdx;
  drawAndShowQuestion();
}

function drawAndShowQuestion() {
  state.currentQuestion = drawQuestion();
  state.questionRevealed = false;
  state.answerResult = null;
  state.stealing = false;
  state.stealerIdx = null;
  state.stealResolved = false;
  state.removedOption = -1;
  state.selectedAnswer = null;
  render();
}

function handleAnswer(idx) {
  if (state.answerResult) return;
  if (state.removedOption === idx) return;
  const q = state.currentQuestion;
  state.selectedAnswer = idx;
  if (idx === q.correct) {
    state.answerResult = "correct";
    playCorrectSfx();
  } else {
    // Check for Paul's Damascus Light passive retry (active player only — stealers
    // don't use tap-to-answer, so this path won't fire mid-steal).
    const activeIdx = state.stealing ? state.stealerIdx : state.currentTurn;
    const activeP = state.players[activeIdx];
    const activeApostle = findApostle(activeP.apostleId);
    if (activeApostle.specialType === "passive-retry" && !activeP.specialUsed) {
      activeP.specialUsed = true;
      // Mark this option as "removed" so they can't pick it again
      state.removedOption = idx;
      state.selectedAnswer = null;
      log(`${activeP.name} called on the Damascus Light — taking a second shot.`);
      playSpecialSfx();
      render();
      return;
    }
    state.answerResult = "wrong";
    playWrongSfx();
  }
  render();
}

// Called when the teacher taps Correct/Wrong during a steal attempt. The stealer
// answers verbally (without seeing the answer options), and the teacher rules on
// it. This is what closes the steal info-leak: the stealer never sees the
// multiple-choice options at all.
function handleStealVerdict(verdict) {
  if (state.answerResult) return;
  if (!state.stealing) return;
  state.answerResult = verdict;
  if (verdict === 'correct') playCorrectSfx();
  else playWrongSfx();
  render();
}

function beginSteal(stealerIdx) {
  state.stealing = true;
  state.stealerIdx = stealerIdx;
  state.answerResult = null;
  state.questionRevealed = true;  // they've already seen the question text
  state.selectedAnswer = null;
  // The stealer doesn't see the answer options at all (info-leak fix). They
  // answer verbally and the teacher taps Correct/Wrong on the verdict buttons.
  log(`${state.players[stealerIdx].name} is stealing!`);
  render();
}

function resolveTurn() {
  // Apply the action's effect now that the question has been answered (and possibly stolen)
  const q = state.currentQuestion;
  const originalIdx = state.currentTurn;
  const original = state.players[originalIdx];
  const originalApostle = findApostle(original.apostleId);

  // Determine the effective answerer
  const answererIdx = state.stealing ? state.stealerIdx : originalIdx;
  const answerer = state.players[answererIdx];
  const correct = state.answerResult === "correct";

  if (state.stealing && correct) {
    // Stealer succeeded -> they deal damage to original player
    const stealDmg = Math.round(findApostle(answerer.apostleId).strikeDamage * 0.8); // slightly less than full
    applyDamage(originalIdx, stealDmg, answererIdx);
    log(`${answerer.name} stole the question and struck ${original.name} for ${stealDmg}!`);
  } else if (!state.stealing && correct) {
    // Original answered correctly -> execute their pending action
    if (state.pendingAction === "strike") {
      let dmg = originalApostle.strikeDamage;
      if (original.charging) {
        dmg *= 2;
        original.charging = false;
        log(`${original.name}'s Pentecost Sermon erupts!`);
      }
      const targetIdx = state.pendingTarget;
      applyDamage(targetIdx, dmg, originalIdx);
      log(`${original.name} struck ${state.players[targetIdx].name} for ${dmg}.`);
    } else if (state.pendingAction === "pray") {
      const before = original.hp;
      original.hp = clamp(original.hp + originalApostle.prayHeal, 0, original.maxHp);
      const healed = original.hp - before;
      showFloatNum(originalIdx, healed, "heal");
      animateCombatant(originalIdx, 'is-healing', 900);
      log(`${original.name} prayed and recovered ${healed} HP.`);
      playHealSfx();
    } else if (state.pendingAction === "defend") {
      original.defending = true;
      log(`${original.name} braces in defense.`);
      playDefendSfx();
    } else if (state.pendingAction === "special-aoe") {
      // Silas earthquake
      original.specialUsed = true;
      log(`${original.name}'s Earthquake at Philippi shakes the arena!`);
      state.players.forEach((p, i) => {
        if (i !== originalIdx && p.alive) {
          applyDamage(i, 18, originalIdx);
        }
      });
      playEarthquakeSfx();
    } else if (state.pendingAction === "special-skip") {
      original.specialUsed = true;
      const target = state.players[state.pendingTarget];
      target.skippingTurn = true;
      log(`${original.name} cornered ${target.name} — they'll skip their next turn.`);
      playSpecialSfx();
    }
  } else {
    // Wrong (and no steal succeeded)
    if (state.stealing) {
      log(`${answerer.name}'s steal failed.`);
    } else {
      log(`${original.name} missed the question.`);
    }
  }

  // Reset question state and advance turn
  state.currentQuestion = null;
  state.questionRevealed = false;
  state.answerResult = null;
  state.stealing = false;
  state.stealerIdx = null;
  state.stealResolved = false;
  state.pendingAction = null;
  state.pendingTarget = null;
  state.selectedAnswer = null;
  state.removedOption = -1;

  // Check for victory
  const alive = alivePlayers();
  if (alive.length <= 1) {
    state.phase = "victory";
    if (alive.length === 1) {
      log(`${alive[0].name} stands alone! Victory!`);
    } else {
      log("All have fallen.");
    }
    render();
    playVictorySfx();
    return;
  }

  nextTurn();
}

function applyDamage(targetIdx, rawDmg, sourceIdx) {
  const target = state.players[targetIdx];
  let dmg = rawDmg;
  if (target.defending) {
    dmg = Math.round(dmg / 2);
    target.defending = false;
    log(`${target.name}'s defense halves the blow!`);
  }
  target.hp = Math.max(0, target.hp - dmg);
  // RPG-style: attacker lunges forward, target gets hit
  if (typeof sourceIdx === 'number' && sourceIdx !== targetIdx) {
    animateCombatant(sourceIdx, 'attacking', 550);
  }
  // Slight delay so the lunge lands before the target shakes
  setTimeout(() => {
    showFloatNum(targetIdx, dmg, "damage");
    animateCombatant(targetIdx, 'is-hit', 550);
    playDamageSfx();
  }, 180);
  if (target.hp <= 0 && target.alive) {
    target.alive = false;
    log(`${target.name} the ${findApostle(target.apostleId).name} has fallen!`);
    // Clear status effects on fallen
    target.defending = false;
    target.charging = false;
    target.skippingTurn = false;
  }
}

function nextTurn() {
  // Advance to next living, non-skipping player
  let attempts = 0;
  while (attempts < state.players.length * 2) {
    state.currentTurn = (state.currentTurn + 1) % state.players.length;
    const p = state.players[state.currentTurn];
    if (!p.alive) { attempts++; continue; }
    if (p.skippingTurn) {
      p.skippingTurn = false;
      log(`${p.name} is forced to skip this turn.`);
      attempts++;
      continue;
    }
    break;
  }
  render();
}

/* =========================================================
   FLOATING NUMBERS / ANIMATION
   ========================================================= */
function showFloatNum(playerIdx, value, kind) {
  setTimeout(() => {
    const el = document.querySelector(`.combatant[data-player="${playerIdx}"]`);
    if (!el) return;
    const span = document.createElement("span");
    span.className = `float-num ${kind}`;
    span.textContent = (kind === "heal" ? "+" : (kind === "damage" ? "-" : "")) + value;
    el.appendChild(span);
    setTimeout(() => span.remove(), 1500);
  }, 40);
}

// Toggle an animation class on a combatant for the given duration.
// Used for 'attacking' (lunge), 'is-hit' (red shake), 'is-healing' (green glow).
function animateCombatant(playerIdx, cls, duration = 600) {
  setTimeout(() => {
    const el = document.querySelector(`.combatant[data-player="${playerIdx}"]`);
    if (!el) return;
    el.classList.add(cls);
    setTimeout(() => el.classList.remove(cls), duration);
  }, 40);
}

// Kept for backward compatibility with any older call sites — routes to the new selector.
function flashHpRow(playerIdx, cls) {
  animateCombatant(playerIdx, cls === 'shake' ? 'is-hit' : cls);
}

/* =========================================================
   AUDIO — Web Audio API procedural drone + SFX
   (Adapted from Saul's Journey)
   ========================================================= */
const audio = { ctx: null, masterGain: null, droneNodes: null };

function initAudio() {
  if (audio.ctx) return;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audio.ctx = new Ctx();
    audio.masterGain = audio.ctx.createGain();
    audio.masterGain.gain.value = 0;
    audio.masterGain.connect(audio.ctx.destination);
  } catch (e) { audio.ctx = null; }
}

function startDrone() {
  if (!audio.ctx) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;
  if (audio.droneNodes) {
    audio.masterGain.gain.cancelScheduledValues(now);
    audio.masterGain.gain.setValueAtTime(audio.masterGain.gain.value, now);
    audio.masterGain.gain.linearRampToValueAtTime(0.30, now + 1.5);
    return;
  }
  const freqs = [98, 146.83, 196];
  const oscs = [];
  const oscGains = [];
  freqs.forEach((f, i) => {
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    o1.type = i === 2 ? 'triangle' : 'sine';
    o2.type = 'sine';
    o1.frequency.value = f;
    o2.frequency.value = f * 1.003;
    const g = ctx.createGain();
    g.gain.value = i === 0 ? 0.22 : (i === 1 ? 0.15 : 0.1);
    o1.connect(g); o2.connect(g);
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 0.07 + i * 0.03;
    lfoGain.gain.value = i === 0 ? 0.05 : 0.03;
    lfo.connect(lfoGain); lfoGain.connect(g.gain);
    g.connect(audio.masterGain);
    o1.start(now); o2.start(now); lfo.start(now);
    oscs.push(o1, o2, lfo); oscGains.push(g);
  });
  audio.droneNodes = { oscs, oscGains };
  audio.masterGain.gain.cancelScheduledValues(now);
  audio.masterGain.gain.setValueAtTime(0, now);
  audio.masterGain.gain.linearRampToValueAtTime(0.30, now + 2.0);
}

function stopDrone() {
  if (!audio.ctx) return;
  const now = audio.ctx.currentTime;
  audio.masterGain.gain.cancelScheduledValues(now);
  audio.masterGain.gain.setValueAtTime(audio.masterGain.gain.value, now);
  audio.masterGain.gain.linearRampToValueAtTime(0, now + 0.8);
}

function toggleAudio() {
  initAudio();
  if (!audio.ctx) return;
  if (audio.ctx.state === 'suspended') audio.ctx.resume();
  state.audioOn = !state.audioOn;
  if (state.audioOn) startDrone();
  else stopDrone();
  updateAudioToggle();
}

function playTone(freq, duration, type = 'sine', vol = 0.15, attack = 0.01, release = 0.2) {
  if (!audio.ctx) return;
  if (!state.audioOn) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(vol, now + attack);
  g.gain.linearRampToValueAtTime(0, now + attack + duration + release);
  osc.connect(g);
  // Route through masterGain so SFX respond to the same volume envelope as the drone
  g.connect(audio.masterGain || audio.ctx.destination);
  osc.start(now);
  osc.stop(now + attack + duration + release + 0.05);
}

function playCorrectSfx() {
  playTone(523.25, 0.10, 'sine', 0.12, 0.005, 0.18);
  setTimeout(() => playTone(659.25, 0.14, 'sine', 0.12, 0.005, 0.22), 80);
}
function playWrongSfx() {
  playTone(349.23, 0.14, 'triangle', 0.10, 0.005, 0.20);
  setTimeout(() => playTone(261.63, 0.22, 'triangle', 0.10, 0.005, 0.30), 100);
}
function playDamageSfx() {
  playTone(180, 0.05, 'sawtooth', 0.14, 0.002, 0.10);
  setTimeout(() => playTone(140, 0.08, 'sawtooth', 0.10, 0.002, 0.14), 35);
}
function playHealSfx() {
  playTone(659.25, 0.10, 'triangle', 0.10, 0.005, 0.20);
  setTimeout(() => playTone(880, 0.14, 'triangle', 0.10, 0.005, 0.30), 70);
}
function playDefendSfx() {
  playTone(220, 0.18, 'sine', 0.14, 0.005, 0.25);
}
function playSpecialSfx() {
  playTone(440, 0.06, 'sine', 0.12, 0.005, 0.15);
  setTimeout(() => playTone(659.25, 0.08, 'sine', 0.12, 0.005, 0.18), 60);
  setTimeout(() => playTone(880, 0.14, 'sine', 0.12, 0.005, 0.25), 130);
}
function playChargeSfx() {
  playTone(130.81, 0.20, 'sawtooth', 0.10, 0.005, 0.35);
  setTimeout(() => playTone(196, 0.28, 'sawtooth', 0.10, 0.005, 0.45), 100);
}
function playEarthquakeSfx() {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => playTone(70 + i*15, 0.12, 'sawtooth', 0.16, 0.002, 0.18), i * 70);
  }
}
function playTransitionSfx() {
  playTone(587.33, 0.18, 'triangle', 0.12, 0.005, 0.4);
  setTimeout(() => playTone(783.99, 0.18, 'triangle', 0.12, 0.005, 0.4), 140);
  setTimeout(() => playTone(987.77, 0.35, 'triangle', 0.11, 0.005, 0.6), 280);
}
function playVictorySfx() {
  playTone(523.25, 0.18, 'triangle', 0.14, 0.005, 0.3);
  setTimeout(() => playTone(659.25, 0.18, 'triangle', 0.14, 0.005, 0.3), 140);
  setTimeout(() => playTone(783.99, 0.18, 'triangle', 0.14, 0.005, 0.3), 280);
  setTimeout(() => playTone(1046.5, 0.4, 'triangle', 0.14, 0.005, 0.5), 420);
}

/* =========================================================
   BOOT
   ========================================================= */
render();
</script>
